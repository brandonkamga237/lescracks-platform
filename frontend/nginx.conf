# Crawlers that don't run JS (search + AI/generative engines) get server-rendered
# HTML snapshots for dynamic detail pages; humans get the normal SPA. This map (in the
# http context via conf.d include) flags known bot user-agents.
map $http_user_agent $is_seo_bot {
    default 0;
    "~*(googlebot|bingbot|duckduckbot|baiduspider|yandex|slurp|facebookexternalhit|facebot|twitterbot|linkedinbot|whatsapp|telegrambot|discordbot|slackbot|applebot|gptbot|oai-searchbot|chatgpt-user|ccbot|claudebot|claude-web|anthropic-ai|perplexitybot|perplexity-user|google-extended|bytespider|amazonbot|meta-externalagent)" 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Public detail routes: send bots to the backend SEO snapshot, humans to the SPA.
    location ~ ^/(evenements|ressources|apprenants)/([^/]+)$ {
        if ($is_seo_bot) {
            rewrite ^ /_seo/$1/$2 last;
        }
        try_files $uri /index.html;
    }

    # Internal-only: proxies the SEO snapshot from the backend (/_seo/x/y -> /seo/x/y).
    location ^~ /_seo/ {
        internal;
        proxy_pass http://lescracks-backend:8080/seo/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # Sitemap is generated live from the DB by the backend, exposed at the site root
    # for crawlers. Exact match wins over the SPA fallback above.
    location = /sitemap.xml {
        proxy_pass http://lescracks-backend:8080/api/sitemap.xml;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /api/ {
        proxy_pass http://lescracks-backend:8080/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # OAuth2 initiation (spring security: /oauth2/authorization/*)
    location /oauth2/ {
        proxy_pass http://lescracks-backend:8080/oauth2/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Force https — nginx sits behind Traefik SSL, $scheme is always http here
        proxy_set_header X-Forwarded-Proto https;
    }

    # OAuth2 callback (spring security: /login/oauth2/code/*)
    location /login/ {
        proxy_pass http://lescracks-backend:8080/login/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}