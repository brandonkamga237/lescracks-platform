# =============================================================================
# LesCracks Platform — CI/CD Pipeline
# =============================================================================
#
# Branching strategy — Gitflow Léger :
#   feature/* / fix/*  →  develop  →  (PR)  →  main  →  deploy prod
#   hotfix/*           →  main (direct, urgence prod)
#
# Déclencheurs :
#   • push main        → build + deploy prod (automatique)
#   • push develop     → build + CI uniquement (pas de deploy)
#   • pull_request → main → build + CI (validation avant merge)
#   • workflow_dispatch → deploy manuel (choix du service)
#
# Required GitHub Secrets:
#   DOCKER_USERNAME   — Docker Hub username
#   DOCKER_PASSWORD   — Docker Hub access token
#   VPS_HOST          — IP du VPS
#   VPS_USER          — Utilisateur SSH (root)
#   VPS_SSH_KEY       — Clé privée SSH
# =============================================================================

name: CI/CD — LesCracks Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service à rebuilder"
        required: false
        default: "all"
        type: choice
        options: [all, backend, frontend]

env:
  BACKEND_IMAGE:  brandoniscoding/backend-lescracks
  FRONTEND_IMAGE: brandoniscoding/frontend-lescracks
  DEPLOY_PATH:    /root/lescracks

jobs:
  # ---------------------------------------------------------------------------
  # Detect which service changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'

  # ---------------------------------------------------------------------------
  # Build backend — Spring Boot → JRE Alpine
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event.inputs.service == 'backend' ||
      github.event.inputs.service == 'all' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context:    ./backend
          target:     prod
          # Push only on main (not on develop, not on PRs)
          push:       ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  # ---------------------------------------------------------------------------
  # Build frontend — Vite + Nginx
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      github.event.inputs.service == 'frontend' ||
      github.event.inputs.service == 'all' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          # Push only on main (not on develop, not on PRs)
          push:       ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — SSH sur le VPS
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Only deploy on push to main (not on develop, not on PRs, not on failed builds)
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host:      ${{ secrets.VPS_HOST }}
          username:  ${{ secrets.VPS_USER }}
          key:       ${{ secrets.VPS_SSH_KEY }}
          source:    "docker-compose.prod.yml"
          target:    "${{ env.DEPLOY_PATH }}/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.VPS_HOST }}
          username:        ${{ secrets.VPS_USER }}
          key:             ${{ secrets.VPS_SSH_KEY }}
          timeout:         60s
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}

            echo "══════════════════════════════════════════════════"
            echo "  LesCracks Platform — Deployment"
            echo "  Date   : $(date '+%Y-%m-%d %H:%M:%S UTC')"
            echo "  Commit : ${{ github.sha }}"
            echo "══════════════════════════════════════════════════"

            # ── 1. Réseau Traefik ─────────────────────────────────
            echo ""
            echo "→ [1/4] Vérification réseau traefik-public..."
            docker network inspect traefik-public >/dev/null 2>&1 || \
              docker network create traefik-public

            # ── 2. Pull des images ────────────────────────────────
            echo ""
            echo "→ [2/4] Pull des images Docker..."
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # ── 3. Démarrage infra + backend ─────────────────────
            echo ""
            echo "→ [3/4] Démarrage infra (PostgreSQL, MinIO)..."
            docker compose -f docker-compose.prod.yml up -d --no-recreate postgres minio

            echo "  Attente PostgreSQL..."
            timeout 60 sh -c \
              'until docker compose -f docker-compose.prod.yml exec -T postgres \
                pg_isready -U "$DB_USERNAME" -d "$DB_NAME" >/dev/null 2>&1; \
              do sleep 3; done'

            echo "  Démarrage backend (Spring Boot — peut prendre ~60s)..."
            docker compose -f docker-compose.prod.yml up -d backend --remove-orphans

            echo "  Attente backend healthy (max 5 min)..."
            BACKEND_OK=0
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' lescracks-backend 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "  Backend healthy (tentative $i — statut Docker: healthy)"
                BACKEND_OK=1
                break
              fi
              echo "  Tentative $i/30 — statut: $STATUS, retry dans 10s..."
              sleep 10
            done

            if [ "$BACKEND_OK" -eq 0 ]; then
              echo ""
              echo "══════ ERREUR : backend non healthy après 5 min ══════"
              echo "  Dernières 100 lignes de logs backend :"
              echo "──────────────────────────────────────────────────────"
              docker logs --tail=100 lescracks-backend 2>&1 || true
              echo "──────────────────────────────────────────────────────"
              exit 1
            fi

            # ── 4. Frontend ───────────────────────────────────────
            echo ""
            echo "→ [4/4] Déploiement frontend..."
            docker compose -f docker-compose.prod.yml up -d frontend --remove-orphans

            # ── Cleanup ───────────────────────────────────────────
            echo ""
            echo "→ Nettoyage images inutilisées..."
            docker image prune -f --filter "until=24h" 2>/dev/null || true

            # ── Statut final ──────────────────────────────────────
            echo ""
            echo "→ Statut des services :"
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "══════════════════════════════════════════════════"
            echo "  Déploiement terminé — $(date '+%H:%M:%S UTC')"
            echo "══════════════════════════════════════════════════"
